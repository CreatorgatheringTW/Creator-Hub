<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鑽石礦坑 - GitHub Edition</title>
    <style>
        /* (這裡保留你原本的 CSS 樣式) */
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #e94560; color: white; padding: 15px 30px; border-radius: 0 0 20px 20px; transition: 0.4s; z-index: 1000; }
        #toast.show { top: 0; }
    </style>
</head>
<body>
    <div id="toast">⚠️ <span id="toast-msg"></span></div>
    
    <div class="container">
        <div id="login-section">
            <button onclick="location.href='http://US1.BotLayer:30045/login'">🔑 Discord 登入</button>
        </div>

        <div id="game-section" style="display:none;">
            <button onclick="location.href='http://US1.BotLayer:30045/logout'">🚪 登出</button>
            <h2 id="user-display"></h2>
            <button class="mine-btn" onclick="mine()">⛏️ 奮力挖掘</button>
            <button class="up-btn" onclick="upgrade()">⬆️ 升級 (Lv.<span id="level">1</span>)</button>
        </div>
    </div>

    <script>
        const API_BASE = "http://US1.BotLayer:30045"; // 你的後端網址

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function updateUI(data) {
            if (!data.success) {
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('game-section').style.display = 'none';
                return;
            }
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('game-section').style.display = 'block';
            document.getElementById('user-display').innerText = "礦工: " + data.username;
            // 更新鑽石、等級等數值的 DOM (依照你的 ID 補充)
        }

        async function apiRequest(action, body = {}) {
            try {
                const res = await fetch(`${API_BASE}/api/action`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, ...body }),
                    credentials: 'include' // 關鍵：允許攜帶 Session Cookie
                });
                return await res.json();
            } catch (e) {
                console.error("API 連線失敗", e);
                return { success: false };
            }
        }

        async function mine() {
            const data = await apiRequest('mine');
            if (data.success) updateUI(data);
        }

        async function upgrade() {
            const data = await apiRequest('upgrade');
            if (data.success) updateUI(data); else showToast(data.message);
        }

        // 初始化檢查是否已登入
        apiRequest('init').then(updateUI);
    </script>
</body>
</html>
